name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    name: Test (LWC ${{ matrix.lwc }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lwc: [8, 9]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - run: yarn add lwc@${{ matrix.lwc }}
      - run: yarn test:coverage
